name: Helm Lint

on:
  push:
    branches:
      - main
    paths:
      - 'chart/**'
  pull_request:
    branches:
      - main
    paths:
      - 'chart/**'

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint chart/little-sample-cluster

      - name: Helm template
        run: helm template little-sample-cluster chart/little-sample-cluster