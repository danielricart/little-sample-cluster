# Default values for little-sample-cluster.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

little_sample_cluster:
  db_host: little-cluster-mysql.kube-public.svc.cluster.local
  db_user: littlecluster
  db_name: users

replicaCount: 1

image:
  repository: ghcr.io/danielricart/little-sample-cluster
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

imagePullSecrets: ["regcred"]
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8089

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

mysql:
  image:
    registry: docker.io
    repository: mysql
    tag: "8.4.8"
    digest: ""
    pullPolicy: IfNotPresent
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false
  networkPolicy:
    enabled: true
    allowExternal: true
  primary:
    resources:
      limits:
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 384Mi
  global:
    mysql:
      auth:
        database: users
        username: littlecluster
        # rootPassword: ""       # set via --set or a values override, never committed
        # password: ""           # set via --set or a values override, never committed
        # replicationPassword: "" # set via --set or a values override, never committed
        existingSecret: ""       # alternative: name of a pre-created K8s Secret
# apiVersion: v1
# kind: Secret
# metadata:
#   name: my-mysql-secret
#   namespace: <your-namespace>
# type: Opaque
# stringData:
#   mysql-root-password: SomeRootPassword
#   mysql-password: SomeAppPassword
