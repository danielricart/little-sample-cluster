apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap
  namespace: argocd
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  source:
    path: infrastructure
    repoURL: git@github.com:danielricart/little-sample-cluster.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true